<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebScraper Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(0.8); }
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stat-item span { color: var(--accent2); font-weight: 500; }

  /* ── Layout ── */
  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    flex: 1;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 1.5rem;
    gap: 1.5rem;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 0.55rem;
    border: none;
    background: none;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
  }

  .input-group { display: flex; flex-direction: column; gap: 0.4rem; }

  label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.65rem 0.85rem;
    border-radius: 8px;
    outline: none;
    transition: border 0.2s;
    width: 100%;
    resize: vertical;
  }

  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 100px; }

  .btn {
    padding: 0.75rem 1.2rem;
    border: none;
    border-radius: 9px;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
  }

  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.78rem;
    padding: 0.5rem 0.85rem;
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-green {
    background: rgba(74,222,128,0.15);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.3);
  }

  .btn-green:hover { background: rgba(74,222,128,0.25); }

  .export-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  /* ── Progress ── */
  .progress-block { display: none; }
  .progress-block.visible { display: block; }

  .progress-bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.5rem;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 0.4rem;
  }

  /* ── Main content ── */
  .content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 1rem;
    flex-wrap: wrap;
  }

  .search-filter {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    flex: 1;
    max-width: 320px;
  }

  .search-filter input {
    border: none;
    background: none;
    padding: 0;
    font-size: 0.82rem;
  }

  .filter-icon { color: var(--muted); font-size: 0.9rem; }

  .result-count {
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
  }

  .result-count span { color: var(--accent2); }

  /* ── Table area ── */
  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 1.25rem 1.5rem;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 3rem;
    opacity: 0.3;
  }

  .empty-state p { font-size: 0.9rem; }

  /* ── Cards grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .result-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .card-url {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--accent);
    word-break: break-all;
    text-decoration: none;
  }

  .card-url:hover { text-decoration: underline; }

  .status-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-ok          { background: rgba(74,222,128,0.15); color: var(--green); }
  .status-unreachable { background: rgba(248,113,113,0.15); color: var(--red); }

  .card-desc {
    font-size: 0.76rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-row {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .card-row-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }

  .tag:hover { background: var(--border); }
  .tag.email { color: var(--accent2); border-color: rgba(247,162,106,0.3); }
  .tag.phone { color: var(--green); border-color: rgba(74,222,128,0.3); }

  .social-links {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .social-link {
    font-size: 0.68rem;
    font-family: var(--mono);
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: rgba(124,106,247,0.1);
    border: 1px solid rgba(124,106,247,0.25);
    color: var(--accent);
    text-decoration: none;
  }

  .social-link:hover { background: rgba(124,106,247,0.2); }

  .sub-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .sub-link {
    font-size: 0.68rem;
    font-family: var(--mono);
    color: var(--muted);
    text-decoration: none;
  }
  .sub-link:hover { color: var(--text); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.8rem;
    padding: 0.75rem 1.1rem;
    border-radius: 10px;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    font-family: var(--mono);
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    WebScraper Pro
  </div>
  <div class="stats-bar">
    <div class="stat-item">Scraped: <span id="hdr-total">0</span></div>
    <div class="stat-item">Emails: <span id="hdr-emails">0</span></div>
    <div class="stat-item">Phones: <span id="hdr-phones">0</span></div>
  </div>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div>
      <div class="section-label">Input Mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-keyword" onclick="setMode('keyword')">Keyword Search</button>
        <button class="mode-btn" id="btn-urls" onclick="setMode('urls')">Paste URLs</button>
      </div>
    </div>

    <!-- Keyword mode -->
    <div id="mode-keyword">
      <div class="section-label">Search Settings</div>
      <div class="input-group">
        <label>Search Keyword</label>
        <input type="text" id="keyword" placeholder="e.g. french polishing London" />
      </div>
      <div class="input-group" style="margin-top:0.75rem">
        <label>Number of Results</label>
        <select id="num-results">
          <option value="5">5 results</option>
          <option value="10" selected>10 results</option>
          <option value="20">20 results</option>
          <option value="30">30 results</option>
        </select>
      </div>
      <div class="input-group" style="margin-top:0.75rem">
        <label>Region / Country</label>
        <select id="region">
          <option value="">🌍 Worldwide</option>

          <optgroup label="── Europe ──">
            <option value="uk">🇬🇧 United Kingdom</option>
            <option value="ie">🇮🇪 Ireland</option>
            <option value="de">🇩🇪 Germany</option>
            <option value="fr">🇫🇷 France</option>
            <option value="es">🇪🇸 Spain</option>
            <option value="it">🇮🇹 Italy</option>
            <option value="nl">🇳🇱 Netherlands</option>
            <option value="pt">🇵🇹 Portugal</option>
            <option value="be">🇧🇪 Belgium</option>
            <option value="se">🇸🇪 Sweden</option>
            <option value="no">🇳🇴 Norway</option>
            <option value="dk">🇩🇰 Denmark</option>
            <option value="fi">🇫🇮 Finland</option>
            <option value="ch">🇨🇭 Switzerland</option>
            <option value="at">🇦🇹 Austria</option>
            <option value="pl">🇵🇱 Poland</option>
            <option value="gr">🇬🇷 Greece</option>
          </optgroup>

          <optgroup label="── North America ──">
            <option value="us">🇺🇸 United States</option>
            <option value="ca">🇨🇦 Canada</option>
            <option value="mx">🇲🇽 Mexico</option>
          </optgroup>

          <optgroup label="── South America ──">
            <option value="br">🇧🇷 Brazil</option>
            <option value="ar">🇦🇷 Argentina</option>
            <option value="co">🇨🇴 Colombia</option>
            <option value="cl">🇨🇱 Chile</option>
            <option value="pe">🇵🇪 Peru</option>
          </optgroup>

          <optgroup label="── Africa ──">
            <option value="za">🇿🇦 South Africa</option>
            <option value="ng">🇳🇬 Nigeria</option>
            <option value="ke">🇰🇪 Kenya</option>
            <option value="gh">🇬🇭 Ghana</option>
            <option value="eg">🇪🇬 Egypt</option>
            <option value="ma">🇲🇦 Morocco</option>
          </optgroup>

          <optgroup label="── Middle East ──">
            <option value="ae">🇦🇪 UAE</option>
            <option value="sa">🇸🇦 Saudi Arabia</option>
            <option value="qa">🇶🇦 Qatar</option>
            <option value="kw">🇰🇼 Kuwait</option>
            <option value="il">🇮🇱 Israel</option>
          </optgroup>

          <optgroup label="── Asia ──">
            <option value="in">🇮🇳 India</option>
            <option value="sg">🇸🇬 Singapore</option>
            <option value="jp">🇯🇵 Japan</option>
            <option value="cn">🇨🇳 China</option>
            <option value="kr">🇰🇷 South Korea</option>
            <option value="hk">🇭🇰 Hong Kong</option>
            <option value="ph">🇵🇭 Philippines</option>
            <option value="my">🇲🇾 Malaysia</option>
            <option value="th">🇹🇭 Thailand</option>
            <option value="id">🇮🇩 Indonesia</option>
            <option value="pk">🇵🇰 Pakistan</option>
            <option value="bd">🇧🇩 Bangladesh</option>
          </optgroup>

          <optgroup label="── Oceania ──">
            <option value="au">🇦🇺 Australia</option>
            <option value="nz">🇳🇿 New Zealand</option>
          </optgroup>
        </select>
      </div>
      <button class="btn btn-primary" style="margin-top:0.75rem" onclick="runKeyword()">
        🔍 Search & Scrape
      </button>
    </div>

    <!-- URL mode -->
    <div id="mode-urls" style="display:none">
      <div class="section-label">URLs to Scrape</div>
      <div class="input-group">
        <label>One URL per line</label>
        <textarea id="url-input" placeholder="https://example.com&#10;https://another-site.co.uk"></textarea>
      </div>
      <button class="btn btn-primary" style="margin-top:0.75rem" onclick="runUrls()">
        ⚡ Scrape URLs
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-block" id="progress-block">
      <div class="section-label">Progress</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">Starting…</div>
    </div>

    <!-- Export -->
    <div>
      <div class="section-label">Export Results</div>
      <div class="export-row">
        <button class="btn btn-outline btn-green" onclick="exportData('csv')">⬇ CSV</button>
        <button class="btn btn-outline btn-green" onclick="exportData('excel')">⬇ Excel</button>
      </div>
    </div>

    <!-- Clear -->
    <button class="btn btn-outline" onclick="clearResults()" style="margin-top:auto">
      🗑 Clear Results
    </button>

  </aside>

  <!-- ── Main content ── -->
  <div class="content">

    <div class="toolbar">
      <div class="search-filter">
        <span class="filter-icon">🔎</span>
        <input type="text" id="filter-input" placeholder="Filter results…" oninput="filterResults()" />
      </div>
      <div class="result-count" id="result-count">No results yet</div>
    </div>

    <div class="table-wrap" id="table-wrap">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🕷️</div>
        <p>Enter a keyword or paste URLs to start scraping</p>
      </div>
      <div class="cards-grid" id="cards-grid" style="display:none"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allResults = [];
  let mode = 'keyword';

  function setMode(m) {
    mode = m;
    document.getElementById('mode-keyword').style.display = m === 'keyword' ? 'block' : 'none';
    document.getElementById('mode-urls').style.display    = m === 'urls'    ? 'block' : 'none';
    document.getElementById('btn-keyword').classList.toggle('active', m === 'keyword');
    document.getElementById('btn-urls').classList.toggle('active', m === 'urls');
  }

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function setProgress(pct, msg) {
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = msg;
  }

  function showProgress(visible) {
    document.getElementById('progress-block').classList.toggle('visible', visible);
  }

  async function runKeyword() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { showToast('⚠️ Enter a keyword first'); return; }
    const num = parseInt(document.getElementById('num-results').value);
    const region = document.getElementById('region').value;

    // Reset for fresh search
    allResults = [];
    renderCards([]);
    showProgress(true);
    const regionLabel = document.getElementById('region').selectedOptions[0].text;
    setProgress(10, `Searching ${region ? regionLabel : 'worldwide'} for "${keyword}"…`);

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({keyword, num, region})
      });
      const data = await res.json();
      if (data.error) { showToast('❌ ' + data.error, 5000); showProgress(false); return; }
      if (data.warning) showToast('⚠️ ' + data.warning, 5000);
      if (!data.urls || data.urls.length === 0) {
        showToast('❌ No URLs found. Try a SERPAPI_KEY env var on Render for reliable results.', 5000);
        showProgress(false);
        return;
      }
      setProgress(30, `Found ${data.urls.length} URLs. Scraping…`);
      await scrapeUrls(data.urls);
    } catch(e) {
      showToast('❌ Network error');
      showProgress(false);
    }
  }

  async function runUrls() {
    const raw = document.getElementById('url-input').value.trim();
    if (!raw) { showToast('⚠️ Paste some URLs first'); return; }
    const urls = [...new Set(raw.split('\n').map(u => u.trim()).filter(Boolean))];

    // Reset for fresh scrape
    allResults = [];
    renderCards([]);
    showProgress(true);
    setProgress(10, `Preparing to scrape ${urls.length} URL(s)…`);
    await scrapeUrls(urls);
  }

  async function scrapeUrls(urls) {
    const batchSize = 5;
    let done = 0;
    for (let i = 0; i < urls.length; i += batchSize) {
      const batch = urls.slice(i, i + batchSize);
      setProgress(30 + Math.round((done / urls.length) * 65), `Scraping ${done + 1}–${Math.min(done + batchSize, urls.length)} of ${urls.length}…`);
      try {
        const res = await fetch('/api/scrape', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({urls: batch})
        });
        const data = await res.json();
        if (data.results) {
          allResults.push(...data.results);
          renderCards(allResults);
          updateStats();
        }
      } catch(e) { /* continue */ }
      done += batch.length;
    }
    setProgress(100, `✅ Done! ${allResults.length} sites scraped.`);
    setTimeout(() => showProgress(false), 2000);
    showToast(`✅ Scraped ${allResults.length} sites`);
  }

  function renderCards(results) {
    const grid = document.getElementById('cards-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (!results.length) {
      grid.style.display = 'none';
      empty.style.display = 'flex';
      document.getElementById('result-count').textContent = 'No results yet';
      return;
    }

    empty.style.display = 'none';
    grid.style.display = 'grid';

    results.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.animationDelay = (i % 10 * 40) + 'ms';

      const socials = r.socials || {};
      const socialHTML = Object.entries(socials).map(([k,v]) =>
        `<a class="social-link" href="${v}" target="_blank">${k}</a>`
      ).join('');

      const emailTags = (r.emails||[]).map(e =>
        `<span class="tag email" onclick="copyText('${e}')" title="Click to copy">${e}</span>`
      ).join('');

      const phoneTags = (r.phones||[]).map(p =>
        `<span class="tag phone" onclick="copyText('${p}')" title="Click to copy">${p}</span>`
      ).join('');

      const subLinks = [];
      if (r.contact_page) subLinks.push(`<a class="sub-link" href="${r.contact_page}" target="_blank">Contact ↗</a>`);
      if (r.about_page)   subLinks.push(`<a class="sub-link" href="${r.about_page}"   target="_blank">About ↗</a>`);

      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${r.name || 'Unknown'}</div>
            <a class="card-url" href="${r.url}" target="_blank">${r.url}</a>
          </div>
          <span class="status-badge status-${r.status === 'ok' ? 'ok' : 'unreachable'}">
            ${r.status === 'ok' ? '✓ live' : '✗ down'}
          </span>
        </div>
        ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
        ${emailTags ? `<div class="card-row"><div class="card-row-label">Emails</div><div class="tag-list">${emailTags}</div></div>` : ''}
        ${phoneTags ? `<div class="card-row"><div class="card-row-label">Phones</div><div class="tag-list">${phoneTags}</div></div>` : ''}
        ${r.address ? `<div class="card-row"><div class="card-row-label">Address</div><div class="tag-list"><span class="tag">${r.address}</span></div></div>` : ''}
        ${socialHTML ? `<div class="card-row"><div class="card-row-label">Socials</div><div class="social-links">${socialHTML}</div></div>` : ''}
        ${subLinks.length ? `<div class="sub-links">${subLinks.join('')}</div>` : ''}
      `;
      grid.appendChild(card);
    });

    document.getElementById('result-count').innerHTML =
      `Showing <span>${results.length}</span> of <span>${allResults.length}</span> results`;
  }

  function updateStats() {
    document.getElementById('hdr-total').textContent  = allResults.length;
    document.getElementById('hdr-emails').textContent = allResults.reduce((s,r)=>s+(r.emails||[]).length,0);
    document.getElementById('hdr-phones').textContent = allResults.reduce((s,r)=>s+(r.phones||[]).length,0);
  }

  function filterResults() {
    const q = document.getElementById('filter-input').value.toLowerCase();
    if (!q) { renderCards(allResults); return; }
    const filtered = allResults.filter(r =>
      (r.name||'').toLowerCase().includes(q) ||
      (r.url||'').toLowerCase().includes(q) ||
      (r.emails||[]).some(e => e.toLowerCase().includes(q)) ||
      (r.phones||[]).some(p => p.toLowerCase().includes(q)) ||
      (r.address||'').toLowerCase().includes(q)
    );
    renderCards(filtered);
  }

  async function exportData(format) {
    if (!allResults.length) { showToast('⚠️ No results to export'); return; }
    const res = await fetch(`/api/export/${format}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({results: allResults})
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `scrape_results.${format === 'csv' ? 'csv' : 'xlsx'}`;
    a.click();
    showToast(`✅ Exported as ${format.toUpperCase()}`);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast(`📋 Copied: ${text}`));
  }

  function clearResults() {
    allResults = [];
    renderCards([]);
    updateStats();
    document.getElementById('filter-input').value = '';
    showToast('🗑 Results cleared');
  }
</script>
</body>
</html>
